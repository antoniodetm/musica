<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detector Pro</title>
    <style>
        :root {
            --primary: #1db954;
            --bg: #121212;
            --card: #1e1e1e;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            background: var(--bg); 
            color: white; 
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 40px 20px 20px;
            flex-shrink: 0;
        }

        .circle-btn {
            width: 200px; height: 200px; border-radius: 50%; border: none;
            background: linear-gradient(145deg, var(--primary), #14833b);
            color: white; font-weight: 800; font-size: 20px; cursor: pointer; 
            margin: 0 auto; display: block;
            box-shadow: 0 10px 30px rgba(29, 185, 84, 0.3);
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .circle-btn:active { transform: scale(0.95); }
        .circle-btn:disabled { background: #444; box-shadow: none; cursor: not-allowed; }

        #loader { display: none; color: var(--primary); font-size: 18px; font-weight: bold; margin: 20px; }

        main {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0 20px;
            -webkit-overflow-scrolling: touch;
        }

        #result-container { 
            background: var(--card); border-radius: 20px; padding: 20px; 
            margin: 10px auto 20px; max-width: 450px; display: none; border: 2px solid var(--primary);
        }

        #history { text-align: left; max-width: 600px; margin: 0 auto; }
        h3 { color: var(--primary); font-size: 22px; position: sticky; top: 0; background: var(--bg); margin: 0; padding: 15px 0; z-index: 10; }
        
        .history-item { 
            background: #282828; padding: 15px; margin: 10px 0; 
            border-radius: 10px; font-size: 16px; border-left: 4px solid var(--primary);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            flex-shrink: 0;
            padding: 20px 0 30px 0;
            background: var(--bg);
            border-top: 1px solid #333;
        }

        .export-btn {
            background: var(--primary); color: white; border: none;
            padding: 15px; border-radius: 12px; cursor: pointer;
            font-size: 16px; width: 85%; font-weight: bold;
        }

        .delete-btn { color: #ff4444; background: none; border: none; font-size: 14px; opacity: 0.6; margin: 20px 0; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <header>
        <button id="btn" class="circle-btn">TOCA PARA<br>IDENTIFICAR</button>
        <div id="loader">ESCUCHANDO...</div>
        
        <div id="result-container">
            <div id="result-text"></div>
            <button id="addBtn" style="background: var(--primary); border: none; color: white; font-size: 30px; border-radius: 50%; width: 50px; height: 50px; margin-top: 15px; cursor: pointer;">+</button>
        </div>
    </header>

    <main>
        <div id="history">
            <h3>Mi Lista</h3>
            <div id="list-container"></div>
            <button onclick="borrarLista()" class="delete-btn">Vaciar historial</button>
        </div>
    </main>

    <footer>
        <button id="exportBtn" class="export-btn">📥 Descargar Lista (.txt)</button>
    </footer>

    <script>
        const btn = document.getElementById('btn');
        const loader = document.getElementById('loader');
        const resultContainer = document.getElementById('result-container');
        const resultText = document.getElementById('result-text');
        const addBtn = document.getElementById('addBtn');
        const listContainer = document.getElementById('list-container');
        const exportBtn = document.getElementById('exportBtn');

        let ultimaCancion = "";
        // Asegúrate de que este token sea válido
        const MI_TOKEN = "7944f7d023c428959f5e1e7810d12bc0";

        window.onload = mostrarLista;

        btn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                const audioChunks = [];

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    identificar(audioBlob);
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                btn.disabled = true;
                loader.style.display = 'block';
                loader.innerText = "ESCUCHANDO...";
                resultContainer.style.display = 'none';
                
                // 7 segundos de grabación para dar margen a la API
                setTimeout(() => { 
                    if (mediaRecorder.state === "recording") {
                        mediaRecorder.stop(); 
                        loader.innerText = "BUSCANDO CANCIÓN..."; 
                    }
                }, 7000); 

            } catch (err) { 
                alert("Error: No se pudo acceder al micrófono. Verifica los permisos."); 
                btn.disabled = false; 
                loader.style.display = 'none';
            }
        };

        async function identificar(blob) {
            const formData = new FormData();
            // Enviamos el blob directamente como un archivo para que AudD lo procese mejor
            formData.append('file', blob, 'recording.wav');
            formData.append('api_token', MI_TOKEN);
            
            try {
                const response = await fetch('https://api.audd.io/', { 
                    method: 'POST', 
                    body: formData 
                });
                
                const data = await response.json();

                if (data.status === "success" && data.result) {
                    const titulo = data.result.title;
                    const artista = data.result.artist;
                    ultimaCancion = `${titulo} - ${artista}`;
                    
                    resultText.innerHTML = `<strong>${titulo}</strong><br>de ${artista}`;
                    resultContainer.style.display = 'block';
                } else { 
                    alert("No se pudo identificar la canción. Prueba a acercar más el teléfono al altavoz."); 
                }
            } catch (e) { 
                console.error("Error API:", e);
                alert("Error de conexión con el servidor de reconocimiento."); 
            } finally { 
                btn.disabled = false; 
                loader.style.display = 'none'; 
            }
        }

        addBtn.onclick = () => {
            let canciones = JSON.parse(localStorage.getItem('mis_canciones') || "[]");
            if (ultimaCancion && canciones[0] !== ultimaCancion) {
                canciones.unshift(ultimaCancion); 
                localStorage.setItem('mis_canciones', JSON.stringify(canciones));
                mostrarLista();
            }
            resultContainer.style.display = 'none';
        };

        function mostrarLista() {
            let canciones = JSON.parse(localStorage.getItem('mis_canciones') || "[]");
            listContainer.innerHTML = canciones.length > 0 
                ? canciones.map(c => `<div class="history-item">${c}</div>`).join('')
                : `<p style="opacity:0.5; text-align:center;">Aún no has guardado canciones.</p>`;
        }

        exportBtn.onclick = () => {
            let canciones = JSON.parse(localStorage.getItem('mis_canciones') || "[]");
            if (canciones.length === 0) return alert("La lista está vacía.");
            let texto = "MI LISTA DE CANCIONES\n" + "=".repeat(25) + "\n\n" + canciones.join("\n");
            let blob = new Blob([texto], { type: "text/plain" });
            let a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "mis_canciones.txt";
            a.click();
        };

        function borrarLista() {
            if(confirm("¿Quieres limpiar todo tu historial?")) {
                localStorage.removeItem('mis_canciones');
                mostrarLista();
            }
        }
    </script>
</body>
</html>
