<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detector Pro</title>
    <style>
        :root {
            --primary: #1db954;
            --bg: #121212;
            --card: #1e1e1e;
            --error: #ff4444;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            background: var(--bg); 
            color: white; 
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header { padding: 40px 20px 10px; flex-shrink: 0; }

        .circle-btn {
            width: 200px; height: 200px; border-radius: 50%; border: none;
            background: linear-gradient(145deg, var(--primary), #14833b);
            color: white; font-weight: 800; font-size: 20px; cursor: pointer; 
            margin: 0 auto; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(29, 185, 84, 0.3);
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* Animación cuando está grabando */
        .recording {
            animation: pulse 1.5s infinite;
            background: linear-gradient(145deg, var(--error), #b91d1d) !important;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); }
        }

        #loader { display: none; color: var(--primary); font-size: 16px; font-weight: bold; margin: 15px; letter-spacing: 1px; }

        main { flex-grow: 1; overflow-y: auto; padding: 0 20px; -webkit-overflow-scrolling: touch; }

        #result-container { 
            background: var(--card); border-radius: 20px; padding: 20px; 
            margin: 15px auto; max-width: 450px; display: none; border: 2px solid var(--primary);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        #history { text-align: left; max-width: 500px; margin: 20px auto; }
        h3 { color: var(--primary); font-size: 22px; position: sticky; top: 0; background: var(--bg); margin: 0; padding: 15px 0; }
        
        .history-item { 
            background: #282828; padding: 15px; margin: 10px 0; 
            border-radius: 12px; font-size: 16px; border-left: 4px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center;
        }

        footer { flex-shrink: 0; padding: 20px; background: var(--bg); border-top: 1px solid #333; }

        .export-btn {
            background: var(--primary); color: white; border: none;
            padding: 18px; border-radius: 12px; cursor: pointer;
            font-size: 16px; width: 100%; max-width: 400px; font-weight: bold;
        }

        .delete-btn { color: var(--error); background: none; border: none; font-size: 13px; opacity: 0.6; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <button id="btn" class="circle-btn">TOCA PARA<br>IDENTIFICAR</button>
        <div id="loader">IDENTIFICANDO...</div>
        
        <div id="result-container">
            <div id="result-text"></div>
            <button id="addBtn" style="background: var(--primary); border: none; color: white; font-size: 30px; border-radius: 50%; width: 50px; height: 50px; margin-top: 15px; cursor: pointer;">+</button>
        </div>
    </header>

    <main>
        <div id="history">
            <h3>Mi Lista</h3>
            <div id="list-container"></div>
        </div>
        <button onclick="borrarLista()" class="delete-btn">Vaciar historial</button>
    </main>

    <footer>
        <button id="exportBtn" class="export-btn">📥 Descargar Lista (.txt)</button>
    </footer>

    <script>
        const btn = document.getElementById('btn');
        const loader = document.getElementById('loader');
        const resultContainer = document.getElementById('result-container');
        const resultText = document.getElementById('result-text');
        const addBtn = document.getElementById('addBtn');
        const listContainer = document.getElementById('list-container');
        const exportBtn = document.getElementById('exportBtn');

        let ultimaCancion = "";
        const MI_TOKEN = "7944f7d023c428959f5e1e7810d12bc0";

        window.onload = mostrarLista;

        btn.onclick = async () => {
            try {
                // Pedimos audio con calidad estándar
                const stream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 44100 } });
                const mediaRecorder = new MediaRecorder(stream);
                const audioChunks = [];

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks);
                    identificar(audioBlob);
                };

                mediaRecorder.start();
                btn.classList.add('recording');
                btn.innerHTML = "ESCUCHANDO...";
                btn.disabled = true;
                resultContainer.style.display = 'none';
                
                setTimeout(() => { 
                    mediaRecorder.stop(); 
                    btn.classList.remove('recording');
                    btn.innerHTML = "TOCA PARA<br>IDENTIFICAR";
                    loader.style.display = 'block';
                    stream.getTracks().forEach(track => track.stop());
                }, 6000);
            } catch (err) { 
                alert("Error: No se pudo acceder al micrófono."); 
                btn.disabled = false; 
            }
        };

        async function identificar(blob) {
            const formData = new FormData();
            formData.append('file', blob);
            formData.append('api_token', MI_TOKEN);
            formData.append('return', 'spotify,apple_music'); // Opcional: añade enlaces de streaming
            
            try {
                const response = await fetch('https://api.audd.io/', { method: 'POST', body: formData });
                const data = await response.json();

                if (data.result) {
                    ultimaCancion = `${data.result.title} - ${data.result.artist}`;
                    resultText.innerHTML = `🎵 <strong>${data.result.title}</strong><br><small>de ${data.result.artist}</small>`;
                    resultContainer.style.display = 'block';
                    resultContainer.scrollIntoView({ behavior: 'smooth' });
                } else { 
                    alert("No se ha podido reconocer la canción. Intenta acercarte más."); 
                }
            } catch (e) { 
                alert("Error de conexión con el servidor."); 
            } finally { 
                btn.disabled = false; 
                loader.style.display = 'none'; 
            }
        }

        addBtn.onclick = () => {
            let canciones = JSON.parse(localStorage.getItem('mis_canciones') || "[]");
            // Evitar duplicados idénticos consecutivos
            if (canciones[0] !== ultimaCancion) {
                canciones.unshift(ultimaCancion); 
                localStorage.setItem('mis_canciones', JSON.stringify(canciones));
                mostrarLista();
            }
            resultContainer.style.display = 'none';
        };

        function mostrarLista() {
            let canciones = JSON.parse(localStorage.getItem('mis_canciones') || "[]");
            listContainer.innerHTML = canciones.map(c => `
                <div class="history-item">
                    <span>${c}</span>
                </div>
            `).join('');
        }

        exportBtn.onclick = () => {
            let canciones = JSON.parse(localStorage.getItem('mis_canciones') || "[]");
            if (canciones.length === 0) return alert("La lista está vacía.");
            let texto = "MI LISTA DE CANCIONES\n" + "=".repeat(25) + "\n\n" + canciones.join("\n");
            let blob = new Blob([texto], { type: "text/plain" });
            let a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "mi_musica_detectada.txt";
            a.click();
        };

        function borrarLista() {
            if(confirm("¿Estás seguro de que quieres borrar todo el historial?")) {
                localStorage.removeItem('mis_canciones');
                mostrarLista();
            }
        }
    </script>
</body>
</html>
